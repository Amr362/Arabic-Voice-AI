kind = "web"
previewPath = "/"
title = "ArabVoice AI"
version = "1.0.0"
id = "artifacts/arabvoice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19010

[services.development]
run = "pnpm --filter @workspace/arabvoice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arabvoice", "run", "build" ]
publicDir = "artifacts/arabvoice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19010"
BASE_PATH = "/"
